version: '3.8'

services:
  # 1. MongoDB Service
  mongodb:
    image: mongo:7.0-noble
    container_name: lms_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - lms_network
    restart: always

  # 2. Express Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/edsanta}
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - lms_network
    restart: always

  # 3. React Frontend Nginx Web Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
        - VITE_USER_ID=demo-user-123
    container_name: lms_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - lms_network
    restart: always

networks:
  lms_network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
